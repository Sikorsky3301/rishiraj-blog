---
layout: default
---
<article class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%b %-d, %Y" }}</p>
  </header>

  <div class="post-content">
    {% if page.youtube_id %}
    <div class="video-embed">
      <iframe
        src="https://www.youtube.com/embed/{{ page.youtube_id }}"
        frameborder="0"
        allowfullscreen>
      </iframe>
    </div>
    {% endif %}

    {{ content }}
  </div>

</article>
