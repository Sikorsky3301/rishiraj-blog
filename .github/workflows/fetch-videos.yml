name: Fetch YouTube Videos

on:
  schedule:
    - cron: '0 */6 * * *'   # runs every 6 hours
  workflow_dispatch:          # lets you trigger it manually from GitHub

jobs:
  fetch-videos:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Fetch new videos
        env:
          YOUTUBE_RSS_URL: ${{ secrets.YOUTUBE_RSS_URL }}
        run: python scripts/fetch_videos.py

      - name: Commit and push new posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          git diff --staged --quiet || (git commit -m "auto: add new video posts" && git push)
